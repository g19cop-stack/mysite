<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ФОТО ПОТОК - Пакетный генератор</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="header">
        <div class="logo">✦ ФОТО ПОТОК</div>
        <div class="status">● API Активен</div>
    </div>

    <div class="main-container">
        <div class="upload-section">
            <h2>Исходные фото</h2>
            <div id="drop-zone" class="drop-zone">
                <div class="upload-icon">↑</div>
                <p>Перетащите фото сюда</p>
                <p class="small">или нажмите для выбора</p>
                <input type="file" id="file-input" multiple accept="image/*" hidden>
            </div>
            <div id="file-list" class="file-list"></div>
        </div>

        <div class="prompt-section">
            <h2>Промпт и Генерация</h2>
            <textarea id="prompt" rows="7" placeholder="Опишите, что хотите сделать с фото..."></textarea>
            
            <button id="process-btn" class="process-button">Генерировать через Flux</button>
        </div>

        <div class="result-section">
            <h2>Результаты</h2>
            <div id="results" class="results-area"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
